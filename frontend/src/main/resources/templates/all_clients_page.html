<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Persons</title>

    <link rel="stylesheet"
          href="/css/styles.css"
          th:href="@{/css/styles.css}">

</head>
<body>
<h2 class="header">Пользователи</h2>
<section class="main-section">
    <div class="container">
        <a href="/create">Создать клиента</a>
        <table border="2">
            <tr>
                <th>Id клиента</th>
                <th>ФИО клиента</th>
                <th>Тип клиента</th>
                <th>Дата добавления</th>
                <th>ip адрес</th>
                <th>mac адрес</th>
                <th>Модель устройства</th>
                <th>Операции</th>
            </tr>

            <tr th:each="client : ${clientsCollection}">
                <td th:text="${client.clientId}"></td>
                <td th:text="${client.clientName}"></td>
                <td th:text="${client.clientType}"></td>
                <td th:text="${client.added}"></td>
                <td th:text="${client.ip}"></td>
                <td th:text="${client.mac}"></td>
                <td th:text="${client.model}"></td>
                <td th:text="${client.address}"></td>
            </tr>
        </table>
    </div>
</section>
<br>
</body>
</html>
