<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка валидации</title>
    <style>
        .error-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 1.5rem;
            border: 2px solid #dc3545;
            border-radius: 8px;
            background: #fff5f5;
        }
        .error-title {
            color: #dc3545;
            margin-bottom: 1rem;
        }
        .error-list {
            list-style: none;
            padding: 0;
        }
        .error-list li {
            padding: 0.5rem 0;
            color: #721c24;
            border-bottom: 1px solid #f5c6cb;
        }
        .error-list li:last-child {
            border-bottom: none;
        }
        .btn-back {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .btn-back:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
<div class="error-container">
    <h2 class="error-title">⚠️ Ошибка валидации</h2>

    <ul class="error-list" th:if="${validationErrors}">
        <li th:each="error : ${validationErrors}" th:text="${error}"></li>
    </ul>

    <p th:if="${validationErrors == null or validationErrors.empty}">
        Произошла неизвестная ошибка при создании записи.
    </p>

    <a href="/create" class="btn-back">← Вернуться к форме</a>
    <a href="/" class="btn-back" style="background: #6c757d;">К списку</a>
</div>
</body>
</html>
